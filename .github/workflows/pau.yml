name: Update Reuters RSS

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright

      # Get the latest release tag and save release data
      - name: Get latest BotBrowser tag
        id: botbrowser
        run: |
          TAG=$(python3 get_bb_tag.py)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $TAG"

      # Install BotBrowser from .deb using the pre-fetched release data
      - name: Install BotBrowser from .deb
        run: |
          # The Python script saved the full release JSON to /tmp/bb_release.json
          if [ ! -f /tmp/bb_release.json ]; then
            echo "ERROR: Release data not found at /tmp/bb_release.json"
            exit 1
          fi

          # Extract the tag name and find the x64 .deb asset
          TAG=$(jq -r '.tag_name' /tmp/bb_release.json)
          DEB_ASSET=$(jq -r '.assets[] | select(.name | test("_x64\\.deb$")) | .name' /tmp/bb_release.json | head -1)

          if [ -z "$DEB_ASSET" ]; then
            echo "ERROR: Could not find Linux x64 .deb asset in release data"
            exit 1
          fi

          echo "Downloading .deb asset: $DEB_ASSET"
          DOWNLOAD_URL="https://github.com/MiddleSchoolStudent/BotBrowser/releases/download/${TAG}/${DEB_ASSET}"
          curl -fL "$DOWNLOAD_URL" -o botbrowser.deb

          sudo dpkg -i botbrowser.deb || sudo apt-get install -f -y

          # Locate the installed binary – it's installed as chromium-browser-stable
          if [ -f /usr/bin/chromium-browser-stable ]; then
            BOTBROWSER_BIN=/usr/bin/chromium-browser-stable
          elif [ -f /usr/bin/botbrowser ]; then
            BOTBROWSER_BIN=/usr/bin/botbrowser
          else
            # Fallback: search for any browser-like binary
            BOTBROWSER_BIN=$(find /usr/bin -name '*browser*' -type f -executable | grep -m1 -E 'chromium|botbrowser' || true)
          fi

          if [ -z "$BOTBROWSER_BIN" ] || [ ! -x "$BOTBROWSER_BIN" ]; then
            echo "ERROR: Could not find installed BotBrowser binary"
            exit 1
          fi

          echo "BOTBROWSER_PATH=$BOTBROWSER_BIN" >> $GITHUB_ENV
          $BOTBROWSER_BIN --version || true

      # Optional: download bot profile (if available)
      - name: Download BotBrowser profile (optional)
        run: |
          TAG=$(jq -r '.tag_name' /tmp/bb_release.json)
          PROFILE_ASSET="botbrowser_${TAG}_x64.enc.zip"
          DOWNLOAD_URL="https://github.com/MiddleSchoolStudent/BotBrowser/releases/download/${TAG}/${PROFILE_ASSET}"
          if curl -fL --output /dev/null --silent --head "$DOWNLOAD_URL"; then
            echo "Profile asset found, downloading..."
            curl -fL "$DOWNLOAD_URL" -o profile.zip
            unzip -q profile.zip
            PROFILE_FILE=$(ls *.enc 2>/dev/null | head -1 || true)
            if [ -n "$PROFILE_FILE" ]; then
              echo "BOTBROWSER_PROFILE=$PWD/$PROFILE_FILE" >> $GITHUB_ENV
              echo "Using profile: $PROFILE_FILE"
            else
              echo "No .enc file found after extraction"
            fi
          else
            echo "No profile asset found for this release"
          fi

      - name: Start FlareSolverr
        run: |
          docker run -d --name flaresolverr -p 8191:8191 -e LOG_LEVEL=info ghcr.io/flaresolverr/flaresolverr:latest

      - name: Wait for FlareSolverr
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8191/v1 >/dev/null; then
              echo "FlareSolverr is up"
              break
            fi
            echo "Waiting... ($i)"
            sleep 3
          done

      - name: Run scraper
        env:
          BOTBROWSER_PATH: ${{ env.BOTBROWSER_PATH }}
          BOTBROWSER_PROFILE: ${{ env.BOTBROWSER_PROFILE }}
          BOTBROWSER_CDP_PORT: "9222"
        run: |
          python lau.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add *.xml opinin.html commentary.html apnews.html debug.log || true

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Auto update RSS [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main
          git push origin main