name: Update Reuters RSS

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # Installed botbrowser alongside your requested libraries
          pip install botbrowser requests beautifulsoup4 lxml

      - name: Run scraper
        env:
          # Optional: If you use a proxy for DataDome evasion, set it in your GitHub Secrets
          # ANTI_BOT_PROXY: ${{ secrets.ANTI_BOT_PROXY }}
          PYTHONUNBUFFERED: "1"
        run: python reuters.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add reuters.xml

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Auto update Reuters RSS [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git pull --rebase origin main
          git push origin main