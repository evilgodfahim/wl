name: Update Reuters RSS

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 playwright

      - name: Install Playwright Chromium
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Install BotBrowser
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=$(python3 get_bb_tag.py)
          echo "BotBrowser latest release: $LATEST"
          echo "BOTBROWSER_TAG=$LATEST" >> $GITHUB_ENV

          DEB_ASSET=$(grep "_x64.deb" /tmp/bb_assets.txt | head -1)
          echo "Using deb asset: $DEB_ASSET"

          if [ -z "$DEB_ASSET" ]; then
            echo "ERROR: no x64 .deb asset found:"
            cat /tmp/bb_assets.txt
            exit 1
          fi

          DEB_URL="https://github.com/MiddleSchoolStudent/BotBrowser/releases/download/${LATEST}/${DEB_ASSET}"
          echo "Downloading: $DEB_URL"
          curl -fL -H "Authorization: Bearer $GH_TOKEN" "$DEB_URL" -o botbrowser.deb
          sudo dpkg -i botbrowser.deb || sudo apt-get install -f -y

          BB_BIN=""
          for candidate in /usr/bin/chromium-browser-stable /usr/bin/chromium-browser /opt/chromium.org/chromium/chromium /usr/bin/botbrowser; do
            if [ -f "$candidate" ] && [ -x "$candidate" ]; then
              BB_BIN="$candidate"
              break
            fi
          done

          if [ -z "$BB_BIN" ]; then
            echo "ERROR: could not find installed browser binary"
            exit 1
          fi

          echo "BotBrowser binary: $BB_BIN"
          "$BB_BIN" --version || true
          echo "BOTBROWSER_PATH=$BB_BIN" >> $GITHUB_ENV

      - name: Download BotBrowser bot-profile
        run: |
          curl -sLo chrome146_win11_x64.enc \
            "https://raw.githubusercontent.com/botswin/BotBrowser/main/profiles/stable/chrome146_win11_x64.enc"
          if [ -s chrome146_win11_x64.enc ]; then
            echo "BOTBROWSER_PROFILE=$PWD/chrome146_win11_x64.enc" >> $GITHUB_ENV
            echo "Using bot profile: chrome146_win11_x64.enc"
          else
            echo "No profile found — BotBrowser will run without a profile"
          fi

      - name: Run scraper
        env:
          BOTBROWSER_PATH: ${{ env.BOTBROWSER_PATH }}
          BOTBROWSER_PROFILE: ${{ env.BOTBROWSER_PROFILE }}
          BOTBROWSER_CDP_PORT: "9222"
        run: |
          python reuters.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add reuters.xml opinin.html commentary.html debug.log || true

          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi

          git commit -m "Auto update Reuters RSS [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git checkout -- debug.log 2>/dev/null || true
          git pull --rebase origin main
          git push origin main